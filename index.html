<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sakura Paradise</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Arial',sans-serif;
}

body{
    min-height:100vh;
    overflow:hidden;
    background:linear-gradient(to bottom,#ffe6f2,#ffcce6);
}

/* Cute Navigation Bar */

nav{
    display:flex;
    justify-content:center;
    gap:15px;
    padding:20px;
    position:relative;
    z-index:10;
}

nav a{
    text-decoration:none;
    color:white;
    background:#ff8fc7;
    padding:12px 24px;
    border-radius:999px;
    font-weight:bold;
    transition:0.3s;
    box-shadow:0 4px 12px rgba(255,105,180,0.3);
}

nav a:hover{
    transform:translateY(-3px);
    background:#ff73b8;
}

/* Welcome Card */

.card{
    position:absolute;
    top:50%;
    left:50%;
    transform:translate(-50%,-50%);
    width:550px;
    max-width:90%;
    background:rgba(255,255,255,0.88);
    border-radius:35px;
    padding:45px;
    text-align:center;
    box-shadow:0 0 30px rgba(255,105,180,0.25);
}

.card h1{
    color:#ff4da6;
    margin-bottom:15px;
}

.card p{
    color:#666;
    line-height:1.7;
    font-size:18px;
}

/* Fox */

.fox{
    position:absolute;
    bottom:15px;
    right:20px;
    font-size:36px;
}

/* Cherry Blossoms */

.petal{
    position:absolute;
    top:-50px;
    font-size:28px;
    animation:fall linear infinite;
}

@keyframes fall{

    0%{
        transform:
        translateY(-50px)
        translateX(0px)
        rotate(0deg);
    }

    50%{
        transform:
        translateY(50vh)
        translateX(40px)
        rotate(180deg);
    }

    100%{
        transform:
        translateY(110vh)
        translateX(-40px)
        rotate(360deg);
    }
}

/* Mobile */

@media(max-width:600px){

    nav{
        flex-wrap:wrap;
        gap:10px;
    }

    nav a{
        padding:10px 18px;
        font-size:14px;
    }

    .card{
        padding:25px;
    }

    .card h1{
        font-size:28px;
    }

    .card p{
        font-size:15px;
    }

    .fox{
        font-size:28px;
    }
}

</style>
</head>

<body>

<nav>
    <a href="#">🏠 Home</a>
    <a href="#">🌸 Gallery</a>
    <a href="#">💖 About</a>
    <a href="#">📩 Contact</a>
</nav>

<div class="card">

    <h1>🌸 Welcome to Sakura Paradise 🌸</h1>

    <p>
        A dreamy cherry blossom world filled with
        pink skies, magical petals, and cozy fox vibes.
    </p>

    <div class="fox">🦊</div>

</div>

<script>

for(let i=0;i<60;i++){

    let petal=document.createElement("div");

    petal.className="petal";

    petal.innerHTML="🌸";

    petal.style.left=Math.random()*100+"vw";

    petal.style.animationDuration=
    (6+Math.random()*8)+"s";

    petal.style.animationDelay=
    Math.random()*5+"s";

    document.body.appendChild(petal);
}

</script>

</body>
</html>
