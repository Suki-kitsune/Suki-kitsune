<!DOCTYPE html>
<html>
<head>
    <title>Cherry Blossom</title>

    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
        }

        body{
            overflow:hidden;
            background:linear-gradient(to bottom,#ffd6eb,#ffc0cb);
            height:100vh;
            font-family:Arial,sans-serif;
        }

        h1{
            position:absolute;
            top:40%;
            left:50%;
            transform:translate(-50%,-50%);
            color:white;
            font-size:60px;
            text-shadow:2px 2px 10px hotpink;
        }

        p{
            position:absolute;
            top:50%;
            left:50%;
            transform:translate(-50%,-50%);
            color:white;
            font-size:22px;
        }

        .petal{
            position:absolute;
            top:-50px;
            font-size:30px;
            animation:fall linear infinite;
        }

        @keyframes fall{
            0%{
                transform:translateY(-50px) rotate(0deg);
                opacity:1;
            }

            100%{
                transform:translateY(110vh) rotate(360deg);
                opacity:0.8;
            }
        }
    </style>
</head>

<body>

<h1>🌸 Welcome 🌸</h1>
<p>Cherry Blossom Paradise</p>

<script>
for(let i=0;i<40;i++){
    let petal=document.createElement("div");
    petal.className="petal";
    petal.innerHTML="🌸";

    petal.style.left=Math.random()*100+"vw";
    petal.style.animationDuration=(5+Math.random()*8)+"s";
    petal.style.animationDelay=Math.random()*5+"s";

    document.body.appendChild(petal);
}
</script>

</body>
</html>
